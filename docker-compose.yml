services:

  postgres:
    image: postgres:17

    container_name: postgres_etl

    environment:
      POSTGRES_DB: etl_notas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5435:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d etl_notas"]
      interval: 10s
      timeout: 5s
      retries: 5

  etl:
    build: .

    container_name: etl_pipeline

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - .env

    volumes:
      - .:/app

    command: python main.py

volumes:
  postgres_data: